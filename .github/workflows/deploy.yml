name: Deploy with Rollback

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Run application test before deployment
      - name: Test app
        run: |
          python app.py &
          APP_PID=$!

          sleep 3

          curl -f http://localhost:5000/health

          kill $APP_PID || true

     #  Deploy to server (runs only if tests pass)
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/devops-app

            echo "Pull latest code"
            git pull

            echo "Build new image"
            docker build -t devops-app:${{ github.sha }} .

            echo "Backup current version"
            CURRENT=$(docker images devops-app:latest -q || true)

            if [ ! -z "$CURRENT" ]; then
              docker tag devops-app:latest devops-app:backup
              echo "Backup created"
            else
              echo "No previous version"
            fi

            echo "Tag new version"
            docker tag devops-app:${{ github.sha }} devops-app:latest

            echo "Stop old containers"
            docker compose down || true

            echo "Deploy"
            docker compose up -d --force-recreate

            echo "Wait for containers to start"
            sleep 15

            echo "Run healthcheck"
            for i in {1..5}; do
              if docker compose exec -T nginx curl -f http://localhost/health; then
                echo "App is healthy"
                exit 0
              fi
              sleep 3
            done

            echo "Healthcheck failed"

            echo "===== LOGS ====="
            docker compose logs app1 --tail=50 || true
            docker compose logs app2 --tail=50 || true
            docker compose logs nginx --tail=50 || true

            echo "Rollback to previous version"
            if docker images devops-app:backup -q | grep -q .; then
              docker tag devops-app:backup devops-app:latest

              docker compose down
              docker compose up -d --force-recreate

              echo "Rollback completed"
            else
              echo "No backup image found"
            fi

            exit 1
