name: Deploy with Rollback

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Build image (версия = commit SHA)
      - name: Build Docker image
        run: |
          docker build -t devops-app:${{ github.sha }} .

      # 💾 Backup старой версии
      - name: Backup current version
        run: |
          CURRENT=$(docker images devops-app:latest -q || true)

          if [ ! -z "$CURRENT" ]; then
            echo "Backup existing version"
            docker tag devops-app:latest devops-app:backup
          else
            echo "No previous version found"
          fi

      # 🏷 Делаем новую версию latest
      - name: Tag new version as latest
        run: |
          docker tag devops-app:${{ github.sha }} devops-app:latest

      # 🚀 Deploy
      - name: Deploy new version
        run: |
          docker compose up -d

      # ⏳ Ждём запуск
      - name: Wait for app
        run: sleep 10

      # ❤️ Healthcheck (главная проверка)
      - name: Healthcheck
        run: |
          for i in {1..5}; do
            if curl -f http://localhost:8080/health; then
              echo "App is healthy"
              exit 0
            fi
            sleep 3
          done

          echo "Healthcheck failed"
          exit 1

      # 🔁 Rollback если что-то пошло не так
      - name: Rollback if failed
        if: failure()
        run: |
          echo "Deployment failed. Rolling back..."

          echo "===== APP1 LOGS ====="
          docker compose logs app1 --tail=50 || true

          echo "===== APP2 LOGS ====="
          docker compose logs app2 --tail=50 || true

          echo "===== NGINX LOGS ====="
          docker compose logs nginx --tail=50 || true

          echo "Restore backup version..."
          docker tag devops-app:backup devops-app:latest

          docker compose down
          docker compose up -d

          exit 1
